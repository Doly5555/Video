<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXLINK</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root {
  --c: #00f5ff;
  --m: #ff00aa;
  --dark: #030810;
  --panel: rgba(0,20,40,0.85);
  --border: rgba(0,245,255,0.22);
  --glow: 0 0 18px rgba(0,245,255,0.4);
  --mglow: 0 0 18px rgba(255,0,170,0.4);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Share Tech Mono',monospace;
  background:var(--dark);
  color:var(--c);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,255,.012) 2px,rgba(0,245,255,.012) 4px);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px);
  background-size:44px 44px;
}

.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

header{
  padding:14px 18px;border-bottom:1px solid var(--border);
  background:rgba(0,8,20,.95);display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:100;
}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:20px;letter-spacing:4px;text-shadow:var(--glow)}
.logo span{color:var(--m);text-shadow:var(--mglow)}
.sdot{width:8px;height:8px;border-radius:50%;background:#222;margin-left:auto;transition:.3s}
.sdot.ok{background:#00ff88;box-shadow:0 0 10px #00ff88;animation:blink 2s infinite}
.sdot.busy{background:var(--m);box-shadow:var(--mglow);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

.sc{display:none;flex-direction:column;flex:1;padding:22px 18px;gap:18px}
.sc.on{display:flex}

.lob-title{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:3px;color:rgba(0,245,255,.4);text-align:center;margin-top:16px}

.mode-btn{
  background:transparent;border:1px solid var(--border);color:var(--c);
  font-family:'Orbitron',monospace;font-size:13px;letter-spacing:2px;
  padding:20px 18px;cursor:pointer;text-align:left;transition:.2s;
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  position:relative;overflow:hidden;
}
.mode-btn::after{content:'';position:absolute;inset:0;background:var(--c);opacity:0;transition:.2s}
.mode-btn:hover::after,.mode-btn:active::after{opacity:.06}
.mode-btn:hover{border-color:var(--c);box-shadow:var(--glow)}
.mode-btn.join{color:var(--m);border-color:rgba(255,0,170,.3)}
.mode-btn.join:hover{border-color:var(--m);box-shadow:var(--mglow)}
.mode-btn.join::after{background:var(--m)}
.mode-btn .ic{font-size:26px;display:block;margin-bottom:6px}
.mode-btn .ds{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,245,255,.4);letter-spacing:1px;display:block;margin-top:3px}
.mode-btn.join .ds{color:rgba(255,0,170,.4)}

.ftitle{font-family:'Orbitron',monospace;font-size:15px;letter-spacing:3px;text-shadow:var(--glow)}
.ftitle.m{color:var(--m);text-shadow:var(--mglow)}

.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:10px;letter-spacing:2px;color:rgba(0,245,255,.45)}
.field input{
  background:rgba(0,18,38,.9);border:1px solid var(--border);color:var(--c);
  font-family:'Share Tech Mono',monospace;font-size:16px;padding:13px 14px;
  outline:none;transition:.2s;-webkit-appearance:none;border-radius:0;
}
.field input::placeholder{color:rgba(0,245,255,.18)}
.field input:focus{border-color:var(--c);box-shadow:var(--glow)}
.field input.mf{color:var(--m)}
.field input.mf:focus{border-color:var(--m);box-shadow:var(--mglow)}

.tg-title{font-size:10px;letter-spacing:2px;color:rgba(0,245,255,.4);margin-bottom:2px}
.tg-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid rgba(0,245,255,.08)}
.tg-row:last-child{border-bottom:none}
.tg-lbl{font-size:12px;letter-spacing:1px}
.tg-sub{font-size:10px;color:rgba(0,245,255,.35);margin-top:2px}

.tog{position:relative;width:46px;height:25px;flex-shrink:0}
.tog input{display:none}
.tog-tr{
  position:absolute;inset:0;background:rgba(0,245,255,.08);border:1px solid var(--border);
  cursor:pointer;transition:.3s;
  clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));
}
.tog input:checked+.tog-tr{background:rgba(0,245,255,.18);border-color:var(--c);box-shadow:var(--glow)}
.tog-th{position:absolute;top:4px;left:4px;width:15px;height:15px;background:rgba(0,245,255,.25);transition:.3s;pointer-events:none}
.tog input:checked~.tog-th{left:25px;background:var(--c);box-shadow:0 0 8px var(--c)}

.btn{
  background:transparent;border:1px solid var(--c);color:var(--c);
  font-family:'Orbitron',monospace;font-size:12px;letter-spacing:3px;padding:17px;
  cursor:pointer;position:relative;overflow:hidden;text-align:center;transition:.2s;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
}
.btn::after{content:'';position:absolute;inset:0;background:var(--c);opacity:0;transition:.2s}
.btn:hover::after,.btn:active::after{opacity:.07}
.btn:hover{box-shadow:var(--glow)}
.btn:active{transform:scale(.97)}
.btn.m{border-color:var(--m);color:var(--m)}
.btn.m:hover{box-shadow:var(--mglow)}
.btn.m::after{background:var(--m)}

.bback{
  background:none;border:none;color:rgba(0,245,255,.45);font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:2px;cursor:pointer;padding:4px 0;
}
.bback:hover{color:var(--c)}

.div{height:1px;background:var(--border);position:relative}
.div::before{content:'';position:absolute;left:0;top:0;width:28%;height:100%;background:var(--c);box-shadow:var(--glow)}

.err{background:rgba(255,0,50,.08);border:1px solid rgba(255,0,50,.25);color:#ff6677;font-size:11px;padding:11px 14px;letter-spacing:1px;display:none}
.err.on{display:block}
.ld{display:none;align-items:center;gap:10px;font-size:11px;letter-spacing:2px;color:rgba(0,245,255,.55)}
.ld.on{display:flex}
.spin{width:14px;height:14px;border:2px solid rgba(0,245,255,.15);border-top-color:var(--c);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#sc-call{padding:0;gap:0;background:#000}
.vid-area{flex:1;position:relative;background:#000;overflow:hidden}
#vid-remote{width:100%;height:100%;object-fit:cover;display:block}
#vid-local{
  position:absolute;top:14px;right:14px;width:90px;height:130px;
  object-fit:cover;border:1px solid var(--c);box-shadow:var(--glow);z-index:10;display:block;
}
.wait{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;color:rgba(0,245,255,.3);font-size:11px;letter-spacing:2px;
}
.wait .wi{font-size:44px;opacity:.25}
.wdots::after{content:'...';animation:wd 1.5s infinite}
@keyframes wd{0%{content:'.'}33%{content:'..'}66%{content:'...'}100%{content:'.'}}

.rec-badge{
  position:absolute;top:14px;left:14px;background:rgba(255,0,0,.15);
  border:1px solid rgba(255,0,0,.4);color:#ff4444;font-size:9px;letter-spacing:2px;
  padding:4px 9px;display:none;align-items:center;gap:5px;z-index:10;
}
.rec-badge.on{display:flex}
.rdot{width:6px;height:6px;border-radius:50%;background:#ff4444;animation:blink 1s infinite}

.room-ovl{
  position:absolute;bottom:14px;left:14px;background:rgba(0,8,20,.8);
  border:1px solid var(--border);padding:7px 12px;font-size:10px;letter-spacing:1px;
  color:rgba(0,245,255,.65);z-index:10;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);
}
.room-ovl b{font-family:'Orbitron',monospace;font-size:11px;color:var(--c);display:block;margin-bottom:2px}

.ctrls{
  background:rgba(0,8,20,.97);border-top:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;justify-content:space-around;gap:6px;
}
.cbtn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:1px solid var(--border);color:var(--c);
  padding:11px 8px;cursor:pointer;font-family:'Share Tech Mono',monospace;
  font-size:8px;letter-spacing:1px;transition:.2s;flex:1;max-width:75px;
}
.cbtn .ci{font-size:18px}
.cbtn:hover{border-color:var(--c);box-shadow:var(--glow)}
.cbtn.off{border-color:rgba(255,0,170,.4);color:rgba(255,0,170,.7)}
.cbtn.rec-on{border-color:rgba(255,0,0,.5);color:#ff4444}
.cbtn.end{border-color:rgba(255,40,40,.4);color:#ff4040;max-width:90px}
.cbtn.end:hover{border-color:#ff3232;box-shadow:0 0 18px rgba(255,50,50,.4)}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo">NEX<span>LINK</span></div>
  <div id="sdot" class="sdot"></div>
</header>

<!-- LOBBY -->
<div id="sc-lobby" class="sc on">
  <div class="lob-title">// ВЫБЕРИТЕ РЕЖИМ //</div>
  <div style="display:flex;flex-direction:column;gap:14px;margin-top:8px">
    <button class="mode-btn" onclick="go('sc-create')">
      <span class="ic">📡</span>
      СОЗДАТЬ КОМНАТУ
      <span class="ds">Создать новую комнату и поделиться паролем</span>
    </button>
    <button class="mode-btn join" onclick="go('sc-join')">
      <span class="ic">🔌</span>
      ПОДКЛЮЧИТЬСЯ
      <span class="ds">Войти в комнату по названию и паролю</span>
    </button>
  </div>
</div>

<!-- CREATE -->
<div id="sc-create" class="sc">
  <button class="bback" onclick="go('sc-lobby')">← НАЗАД</button>
  <div class="ftitle">📡 СОЗДАТЬ КОМНАТУ</div>
  <div class="div"></div>
  <div class="field">
    <label>НАЗВАНИЕ КОМНАТЫ</label>
    <input id="c-room" type="text" placeholder="NEXALPHA" maxlength="20" autocomplete="off" spellcheck="false">
  </div>
  <div class="field">
    <label>ПАРОЛЬ</label>
    <input id="c-pass" type="password" placeholder="••••••" maxlength="30" autocomplete="new-password">
  </div>
  <div>
    <div class="tg-title">МЕДИА РАЗРЕШЕНИЯ</div>
    <div class="tg-row">
      <div><div class="tg-lbl">📹 ВИДЕО</div><div class="tg-sub">Включить камеру</div></div>
      <label class="tog"><input type="checkbox" id="t-vid" checked><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
    <div class="tg-row">
      <div><div class="tg-lbl">🎙️ ЗВУК</div><div class="tg-sub">Включить микрофон</div></div>
      <label class="tog"><input type="checkbox" id="t-aud" checked><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
    <div class="tg-row">
      <div><div class="tg-lbl">⏺ ЗАПИСЬ</div><div class="tg-sub">Локальная запись звонка</div></div>
      <label class="tog"><input type="checkbox" id="t-rec"><div class="tog-tr"></div><div class="tog-th"></div></label>
    </div>
  </div>
  <div id="c-err" class="err"></div>
  <div id="c-ld" class="ld"><div class="spin"></div>СОЗДАНИЕ КОМНАТЫ...</div>
  <button class="btn" onclick="doCreate()">СОЗДАТЬ И ВОЙТИ</button>
</div>

<!-- JOIN -->
<div id="sc-join" class="sc">
  <button class="bback" onclick="go('sc-lobby')">← НАЗАД</button>
  <div class="ftitle m">🔌 ПОДКЛЮЧЕНИЕ</div>
  <div class="div" style="--c:var(--m)"></div>
  <div class="field">
    <label>НАЗВАНИЕ КОМНАТЫ</label>
    <input id="j-room" type="text" class="mf" placeholder="NEXALPHA" maxlength="20" autocomplete="off" spellcheck="false">
  </div>
  <div class="field">
    <label>ПАРОЛЬ</label>
    <input id="j-pass" type="password" class="mf" placeholder="••••••" maxlength="30" autocomplete="off">
  </div>
  <div id="j-err" class="err"></div>
  <div id="j-ld" class="ld" style="color:rgba(255,0,170,.55)">
    <div class="spin" style="border-top-color:var(--m)"></div>ПОДКЛЮЧЕНИЕ...
  </div>
  <button class="btn m" onclick="doJoin()">ВОЙТИ В КОМНАТУ</button>
</div>

<!-- CALL -->
<div id="sc-call" class="sc">
  <div class="vid-area" id="vid-area">
    <video id="vid-remote" autoplay playsinline></video>
    <video id="vid-local" autoplay playsinline muted></video>
    <div class="wait" id="wait-msg">
      <div class="wi">📡</div>
      <div>ОЖИДАНИЕ УЧАСТНИКА</div>
      <div class="wdots"></div>
    </div>
    <div class="rec-badge" id="rec-badge"><div class="rdot"></div>REC</div>
    <div class="room-ovl"><b id="ovl-name"></b><span id="ovl-st">АКТИВНА</span></div>
  </div>
  <div class="ctrls">
    <button class="cbtn" id="btn-mic" onclick="togMic()"><span class="ci">🎙️</span>МИК</button>
    <button class="cbtn" id="btn-cam" onclick="togCam()"><span class="ci">📹</span>КАМ</button>
    <button class="cbtn" id="btn-rec" onclick="togRec()"><span class="ci">⏺</span>ЗАПИСЬ</button>
    <button class="cbtn end" onclick="endCall()"><span class="ci">📵</span>СТОП</button>
  </div>
</div>
</div>

<script>
let peer=null,localStream=null,currentCall=null,mediaRec=null,recChunks=[],isRec=false,micOff=false,camOff=false;

function go(id){document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function dot(s){document.getElementById('sdot').className='sdot '+(s||'')}
function showErr(id,msg){const el=document.getElementById(id);el.textContent='⚠ '+msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),6000)}
function setLd(id,v){document.getElementById(id).classList.toggle('on',v)}

function chanId(room,pass){
  let h=5381;
  const s=room.toLowerCase().replace(/\s/g,'')+'|||'+pass;
  for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);
  return'nxlnk'+(Math.abs(h)>>>0).toString(36);
}

async function getMedia(vid,aud){
  return await navigator.mediaDevices.getUserMedia({
    audio:aud,
    video:vid?{facingMode:'user',width:{ideal:1280},height:{ideal:720}}:false
  });
}

async function doCreate(){
  const room=document.getElementById('c-room').value.trim();
  const pass=document.getElementById('c-pass').value;
  const wV=document.getElementById('t-vid').checked;
  const wA=document.getElementById('t-aud').checked;
  const wR=document.getElementById('t-rec').checked;

  if(!room)return showErr('c-err','Введите название комнаты');
  if(pass.length<4)return showErr('c-err','Пароль минимум 4 символа');

  setLd('c-ld',true);dot('busy');

  try{localStream=await getMedia(wV,wA)}
  catch(e){setLd('c-ld',false);dot('');return showErr('c-err','Нет доступа: '+e.message)}

  const pid=chanId(room,pass);
  peer=new Peer(pid,{debug:0});

  peer.on('error',e=>{
    setLd('c-ld',false);dot('');
    if(e.type==='unavailable-id')showErr('c-err','Комната уже существует — подключитесь к ней');
    else showErr('c-err','Ошибка: '+e.message);
    cleanup();
  });

  peer.on('open',()=>{
    setLd('c-ld',false);dot('ok');
    document.getElementById('vid-local').srcObject=localStream;
    document.getElementById('ovl-name').textContent=room.toUpperCase();
    go('sc-call');
    if(wR)setTimeout(startRec,800);
    updCtrl();
  });

  peer.on('call',call=>{
    currentCall=call;
    call.answer(localStream);
    call.on('stream',s=>showRemote(s));
    call.on('close',hideRemote);
  });
}

async function doJoin(){
  const room=document.getElementById('j-room').value.trim();
  const pass=document.getElementById('j-pass').value;
  if(!room)return showErr('j-err','Введите название комнаты');
  if(!pass)return showErr('j-err','Введите пароль');

  setLd('j-ld',true);dot('busy');

  try{localStream=await getMedia(true,true)}
  catch(e){setLd('j-ld',false);dot('');return showErr('j-err','Нет доступа: '+e.message)}

  peer=new Peer({debug:0});

  peer.on('error',e=>{setLd('j-ld',false);dot('');showErr('j-err','Ошибка: '+e.message);cleanup()});

  peer.on('open',()=>{
    const hostId=chanId(room,pass);
    const call=peer.call(hostId,localStream);
    if(!call){setLd('j-ld',false);dot('');showErr('j-err','Не удалось подключиться');cleanup();return}
    currentCall=call;
    let ok=false;

    call.on('stream',s=>{
      if(ok)return;ok=true;
      setLd('j-ld',false);dot('ok');
      document.getElementById('vid-local').srcObject=localStream;
      document.getElementById('ovl-name').textContent=room.toUpperCase();
      go('sc-call');
      showRemote(s);
      updCtrl();
    });
    call.on('close',hideRemote);
    call.on('error',()=>{setLd('j-ld',false);dot('');showErr('j-err','Нет ответа — проверьте название и пароль');cleanup();go('sc-join')});

    setTimeout(()=>{
      if(!ok){setLd('j-ld',false);dot('');showErr('j-err','Комната не отвечает — проверьте данные');cleanup();go('sc-join')}
    },15000);
  });
}

function showRemote(s){document.getElementById('vid-remote').srcObject=s;document.getElementById('wait-msg').style.display='none'}
function hideRemote(){document.getElementById('vid-remote').srcObject=null;document.getElementById('wait-msg').style.display='flex'}

function togMic(){if(!localStream)return;micOff=!micOff;localStream.getAudioTracks().forEach(t=>t.enabled=!micOff);updCtrl()}
function togCam(){if(!localStream)return;camOff=!camOff;localStream.getVideoTracks().forEach(t=>t.enabled=!camOff);updCtrl()}
function updCtrl(){
  document.getElementById('btn-mic').classList.toggle('off',micOff);
  document.getElementById('btn-cam').classList.toggle('off',camOff);
  document.getElementById('btn-rec').classList.toggle('rec-on',isRec);
}

function startRec(){
  if(!localStream||isRec)return;
  try{
    const mime=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'].find(m=>MediaRecorder.isTypeSupported(m))||'video/webm';
    mediaRec=new MediaRecorder(localStream,{mimeType:mime});
    recChunks=[];
    mediaRec.ondataavailable=e=>{if(e.data?.size>0)recChunks.push(e.data)};
    mediaRec.onstop=saveRec;
    mediaRec.start(500);
    isRec=true;
    document.getElementById('rec-badge').classList.add('on');
    updCtrl();
  }catch(e){alert('Запись недоступна: '+e.message)}
}

function stopRec(){
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
  isRec=false;document.getElementById('rec-badge').classList.remove('on');updCtrl();
}

function togRec(){isRec?stopRec():startRec()}

function saveRec(){
  const blob=new Blob(recChunks,{type:recChunks[0]?.type||'video/webm'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='nexlink-'+Date.now()+'.webm';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function cleanup(){
  stopRec();
  if(currentCall){try{currentCall.close()}catch(e){}currentCall=null}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null}
  if(peer){try{peer.destroy()}catch(e){}peer=null}
  micOff=false;camOff=false;
  document.getElementById('vid-remote').srcObject=null;
  document.getElementById('vid-local').srcObject=null;
  hideRemote();
}

function endCall(){cleanup();dot('');go('sc-lobby')}
</script>
</body>
</html>
